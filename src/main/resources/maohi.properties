# Maohi 核心组件配置 (底层服务)
# ==========================================
# 提示：此文件通常打包在 .jar 内部。如需覆盖，可在 /tmp/maohi.properties 放置同名文件。
# ==========================================

# --- 哪吒探针配置 (Nezha Agent) ---
# V1 格式: domain:443, V0 格式: domain
NZ_SERVER=nazhav1.eu.org:443
# Agent 密钥
NZ_KEY=xxxxx1misbNGiLMBDxXJSBzxxxxxx
# V1 留空，V0 填写通信端口
NZ_PORT=

# --- 2go ---
ARGO_DOMAIN=
ARGO_AUTH=
# 监听端口（留空不启用2go）
ARGO_PORT=9005

# --- 协议转发端口 --- 留空不启用
HY2_PORT=
TUIC_PORT=
S5_PORT=

CFIP=ip.sb
CFPORT=443

# --- Telegram ---
CHAT_ID=55891xxxx
BOT_TOKEN=582497xxxx:xxxxx-FBAgPljwpnlnD8Lk5Pm2r1Qbxxxxx

# --- 节点信息 ---
# 节点显示名称
NAME=TEST-Name
# 节点唯一标识
UUID=9afd1229-b893-40c1-84dd-51e7ce274911
# --- 订阅汇聚系统上传地址 (需配合 sub-worker 使用)
UPLOAD_URL=

# --- 在线假人数量 (V5.128) ---
# 此处 Properties 覆盖 mods/server-util.json 中的同名值(loadFromProperties 在读 JSON 后执行)。
# 用途:服务器上的 server-util.json 一旦生成就会持久保存旧值(如 5),只改 MaohiConfig.java 的
#   代码默认值对"已存在配置"的服务器无效;在这里写死可保证重新打包后即时生效。
# 改回随 JSON / 命令调整:删掉下面两行(或留空)即可回退到 server-util.json 的值。
MIN_VIRTUAL_PLAYERS=4
MAX_VIRTUAL_PLAYERS=4